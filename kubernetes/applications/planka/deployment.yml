apiVersion: v1
kind: PersistentVolume
metadata:
  name: planka-volume
  labels:
    app: planka
spec:
  capacity:
    storage: 8Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: "/srv/planka"
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - koto
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: planka-volume-claim
spec:
  volumeName: planka-volume
  storageClassName: local-storage
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: planka
  labels:
    app: planka
spec:
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: planka
  replicas: 1
  template:
    metadata:
      labels:
        app: planka
    spec:
      containers:
        - name: planka
          image: ghcr.io/plankanban/planka:latest
          imagePullPolicy: Always
          env:
            - name: BASE_URL
              value: https://kanban.riichi.me
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: planka-secrets
                  key: database-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: planka-secrets
                  key: secret-key
            - name: DEFAULT_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: planka-secrets
                  key: default-admin-email
            - name: DEFAULT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: planka-secrets
                  key: default-admin-password
            - name: DEFAULT_ADMIN_NAME
              valueFrom:
                secretKeyRef:
                  name: planka-secrets
                  key: default-admin-name
            - name: DEFAULT_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: planka-secrets
                  key: default-admin-username
            - name: TRUST_PROXY
              value: "true"
          ports:
            - containerPort: 1337
          volumeMounts:
            - mountPath: "/app/data"
              name: planka-volume-mount
      volumes:
        - name: planka-volume-mount
          persistentVolumeClaim:
            claimName: planka-volume-claim
---
apiVersion: v1
kind: Service
metadata:
  name: planka
spec:
  type: ClusterIP
  ports:
  - name: http
    targetPort: 1337
    port: 80
  selector:
    app: planka
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: planka
spec:
  routes:
    - kind: Rule
      match: Host(`kanban.riichi.me`)
      priority: 10
      services:
        - name: planka
          port: 80
